---
- name: Shutdown Servers Immediately
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Issue shutdown command
      ansible.builtin.command: /sbin/shutdown -h now
      async: 1
      poll: 0

    - name: Wait for SSH port 22 to close
      ansible.builtin.wait_for:
        host: "{{ inventory_hostname }}"
        port: 22
        state: stopped
        delay: 5
        timeout: 60
      delegate_to: localhost