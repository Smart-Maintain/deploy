- name: Check if k3s is already installed
  stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

- name: Download k3s install script
  get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s-install.sh
    mode: '0755'
  when: not k3s_binary.stat.exists

- name: Install k3s server
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    INSTALL_K3S_EXEC: "server --disable servicelb --write-kubeconfig-mode 644"
  command: /tmp/k3s-install.sh
  when: not k3s_binary.stat.exists

- name: Enable and start k3s
  systemd:
    name: k3s
    enabled: yes
    state: started

- name: Wait for k3s to be ready
  command: k3s kubectl get nodes
  register: k3s_ready
  retries: 10
  delay: 10
  until: k3s_ready.rc == 0

- name: Create .kube directory for azureuser
  file:
    path: /home/azureuser/.kube
    state: directory
    owner: azureuser
    group: azureuser
    mode: '0750'

- name: Copy kubeconfig for azureuser
  copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: /home/azureuser/.kube/config
    owner: azureuser
    group: azureuser
    mode: '0600'
    remote_src: yes

- name: Install Helm
  block:
    - name: Download Helm install script
      get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        dest: /tmp/get-helm.sh
        mode: '0755'

    - name: Run Helm install script
      environment:
        DESIRED_VERSION: "{{ helm_version }}"
      command: /tmp/get-helm.sh