- name: Create argocd namespace
  command: k3s kubectl create namespace argocd
  register: ns_result
  failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr

- name: Install Argo CD
  command: >
    k3s kubectl apply -n argocd
    -f https://raw.githubusercontent.com/argoproj/argo-cd/{{ argocd_version }}/manifests/install.yaml

- name: Wait for Argo CD server to be ready
  command: >
    k3s kubectl rollout status deployment/argocd-server
    -n argocd --timeout=120s
  retries: 3
  delay: 20

- name: Patch Argo CD server to use NodePort (for dev access without load balancer)
  command: >
    k3s kubectl patch svc argocd-server -n argocd
    -p '{"spec":{"type":"NodePort","ports":[{"port":443,"targetPort":8080,"nodePort":30080}]}}'

- name: Get initial Argo CD admin password
  command: >
    k3s kubectl -n argocd get secret argocd-initial-admin-secret
    -o jsonpath="{.data.password}"
  register: argocd_password_b64

- name: Print Argo CD initial password (save this)
  debug:
    msg: "Argo CD password: {{ argocd_password_b64.stdout | b64decode }}"