- name: Set vm.max_map_count for Elasticsearch (SonarQube requirement)
  sysctl:
    name: vm.max_map_count
    value: "262144"
    sysctl_set: yes
    state: present
    reload: yes

- name: Create SonarQube directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/sonarqube/data
    - /opt/sonarqube/logs
    - /opt/sonarqube/extensions

- name: Create SonarQube docker-compose file
  copy:
    dest: /opt/sonarqube/docker-compose.yml
    content: |
      services:
        sonarqube:
          image: sonarqube:10.5-community
          container_name: sonarqube
          restart: unless-stopped
          ports:
            - "9000:9000"
          environment:
            SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
            SONAR_JDBC_USERNAME: sonar
            SONAR_JDBC_PASSWORD: sonar_pass
          volumes:
            - /opt/sonarqube/data:/opt/sonarqube/data
            - /opt/sonarqube/logs:/opt/sonarqube/logs
            - /opt/sonarqube/extensions:/opt/sonarqube/extensions
          depends_on:
            sonar-db:
              condition: service_healthy

        sonar-db:
          image: postgres:15-alpine
          container_name: sonar-db
          restart: unless-stopped
          environment:
            POSTGRES_USER: sonar
            POSTGRES_PASSWORD: sonar_pass
            POSTGRES_DB: sonar
          volumes:
            - sonar_db_data:/var/lib/postgresql/data
          healthcheck:
            test: ["CMD-SHELL", "pg_isready -U sonar"]
            interval: 10s
            timeout: 5s
            retries: 5

      volumes:
        sonar_db_data:

- name: Start SonarQube with docker compose
  command: docker compose up -d
  args:
    chdir: /opt/sonarqube