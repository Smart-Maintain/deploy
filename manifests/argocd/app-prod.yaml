apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: app-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Smart-Maintain/deploy
    targetRevision: main
    path: charts/umbrella
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://10.0.0.5:6443    # prod k3s API
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: false    # prod requires manual approval